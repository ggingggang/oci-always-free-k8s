apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: external-dns-smoketest
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns-smoketest
    app.kubernetes.io/component: dns-verification
    app.kubernetes.io/managed-by: manual
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
  hostnames:
    - edns-test.<your-domain.com>
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
