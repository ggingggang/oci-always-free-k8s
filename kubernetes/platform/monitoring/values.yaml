prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 3d
    retentionSize: 4GB
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        memory: 768Mi
    storageSpec:
      emptyDir:
        sizeLimit: 5Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 64Mi

grafana:
  fullnameOverride: grafana
  service:
    type: ClusterIP
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus-node-exporter:
  hostNetwork: false
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
