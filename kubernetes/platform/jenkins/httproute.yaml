apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jenkins
  namespace: cicd
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-wildcard
  hostnames:
    - jenkins.<your-domain>
  rules:
    - backendRefs:
        - name: jenkins
          port: 8080
