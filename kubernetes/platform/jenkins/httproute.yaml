# jenkins HTTPRoute — webhook(active) + admin UI(parked)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jenkins-webhook
  namespace: cicd
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-wildcard
  hostnames:
    - ci-hook.ggang.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /github-webhook/
      backendRefs:
        - name: jenkins
          port: 8080
---
