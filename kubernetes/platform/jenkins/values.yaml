controller:
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      memory: 2Gi

  admin:
    username: admin
    existingSecret: jenkins-admin-fixed
    userKey: jenkins-admin-user
    passwordKey: jenkins-admin-password

  runAsUser: 1000
  fsGroup: 1000

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  serviceType: ClusterIP
  servicePort: 8080

  jenkinsUrl: "https://jenkins.ggang.cloud/"
  jenkinsAdminEmail: "admin@ggang.cloud"

  numExecutors: 0

  containerEnv:
    - name: GH_ORG
      value: GGingGGang
    - name: GIT_PAT
      valueFrom:
        secretKeyRef:
          name: jenkins-git-pat
          key: token

  installPlugins:
