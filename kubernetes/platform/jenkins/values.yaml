  installLatestPlugins: false

  JCasC:
    defaultConfig: true
    configScripts:
      welcome-config: |
        jenkins:
          systemMessage: "Jenkins managed via JCasC. Source of truth = git."
      env-config: |
        jenkins:
          globalNodeProperties:
            - envVars:
                env:
                  - key: GH_ORG
                    value: ${GH_ORG}
      credentials-config: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: github-token
                      username: GGingGGang
                      password: ${GIT_PAT}
                      description: "GitHub PAT (repo scope) — manifest bump push"
      jobs-config: |
        jobs:
          - script: |
              pipelineJob('core') {
                properties {
                  githubProjectUrl('https://github.com/${GH_ORG}/k8s-test-core-server/')
                }
                triggers {
                  githubPush()
                }
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/${GH_ORG}/k8s-test-core-server.git')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }

persistence:
  enabled: false

agent:
  enabled: true
  containerCap: 2

  image:
    repository: docker.io/jenkins/inbound-agent
    tag: 3327.v868139a_d00e0-3-jdk21

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      memory: 512Mi

  podTemplates:
    kaniko: |
      - name: kaniko
        label: kaniko
        namespace: build
        serviceAccount: kaniko-builder
        yaml: |
          apiVersion: v1
          kind: Pod
          spec:
            automountServiceAccountToken: false
            containers:
              - name: jnlp
                image: docker.io/jenkins/inbound-agent:3327.v868139a_d00e0-3-jdk21
                resources:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
              - name: kaniko
                image: gcr.io/kaniko-project/executor:v1.23.2-debug
                command: ["sleep"]
                args: ["99d"]
                resources:
                  requests:
                    cpu: 200m
                    memory: 1Gi
                  limits:
                    memory: 2Gi
                volumeMounts:
                  - name: docker-config
                    mountPath: /kaniko/.docker
            volumes:
              - name: docker-config
                projected:
                  sources:
                    - secret:
                        name: ghcr-push
                        items:
                          - key: .dockerconfigjson
                            path: config.json

serviceAccount:
  create: false
  name: jenkins

rbac:
  create: false

prometheus:
  enabled: false
