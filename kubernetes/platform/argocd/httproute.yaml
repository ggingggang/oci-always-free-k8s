apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: cicd
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-wildcard
  hostnames:
    - "argocd.ggang.cloud"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
