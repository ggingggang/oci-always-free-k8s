apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-rbac
  namespace: cicd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: https://github.com/GGingGGang/oci-always-free-k8s.git
    targetRevision: main
    path: kubernetes/platform/jenkins
    directory:
      recurse: false
      include: "rbac.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
