apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: cicd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 7.7.23
      helm:
        valueFiles:
          - $values/kubernetes/platform/argocd/values.yaml
    - repoURL: https://github.com/GGingGGang/oci-always-free-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
