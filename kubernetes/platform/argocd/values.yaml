global:
  domain: ""

server:
  service:
    type: ClusterIP
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

dex:
  enabled: false

notifications:
  enabled: false

redis-ha:
  enabled: false

redis:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

configs:
  params:
    server.insecure: true
  cm:
    timeout.reconciliation: "180s"
