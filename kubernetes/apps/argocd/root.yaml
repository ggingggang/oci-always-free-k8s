apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-root
  namespace: cicd
spec:
  project: apps
  source:
    repoURL: https://github.com/GGingGGang/oci-always-free-k8s.git
    targetRevision: main
    path: kubernetes/apps/argocd/apps
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
